<html>
<head>
<meta charset="ISO-8859-1">
<title>Calculator Application Using Servlet</title>
</head>

<body>

<form method="get" action="CalculatorServlet">

Enter First Number
<input type="text" name="num1"><br>

Enter Second Number
<input type="text" name="num2"><br>

Select an Operation

<input type="radio" name="opr" value="+"> ADDITION

<input type="radio" name="opr" value="-"> SUBTRACTION

<input type="radio" name="opr" value="*"> MULTIPLY

<input type="radio" name="opr" value="/"> DIVIDE

<br>

<input type="reset">

<input type="submit" value="Calculate">

</form>

</body>
</html>
